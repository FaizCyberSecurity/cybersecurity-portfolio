<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/Favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReconForge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --border: #1e2330;
      --accent: #00ff9d;
      --accent-dim: rgba(0,255,157,0.08);
      --red: #ff4d6d;
      --yellow: #ffd166;
      --text: #c9d1d9;
      --muted: #4a5568;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-shadow: 0 0 24px rgba(0,255,157,0.3);
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.4rem;
      font-family: var(--mono);
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      max-width: 600px;
      margin: 0 auto 2.5rem;
    }

    input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,255,157,0.1); }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.75rem 1.4rem;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }

    #output { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeIn 0.25s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--accent-dim);
    }

    .port-badge {
      font-family: var(--mono);
      font-size: 0.78rem;
      background: var(--accent);
      color: #000;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .service-name {
      font-family: var(--mono);
      font-size: 1.05rem;
      color: var(--accent);
      font-weight: 400;
    }

    .risk-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      letter-spacing: 0.08em;
    }

    .risk-high   { background: rgba(255,77,109,0.15); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }
    .risk-medium { background: rgba(255,209,102,0.12); color: var(--yellow); border: 1px solid rgba(255,209,102,0.3); }
    .risk-low    { background: rgba(0,255,157,0.08); color: var(--accent); border: 1px solid rgba(0,255,157,0.2); }

    .card-body { padding: 1rem 1.2rem; }

    .section-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      margin-top: 1rem;
    }

    .section-label:first-child { margin-top: 0; }

    ul { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }

    ul li {
      font-size: 0.88rem;
      color: var(--text);
      padding-left: 1.1rem;
      position: relative;
      line-height: 1.5;
    }

    ul li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .cmd-block {
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.65rem 0.9rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: #8be9fd;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .cmd-line { display: flex; align-items: flex-start; gap: 0.5rem; }
    .prompt { color: var(--muted); user-select: none; }

    .empty {
      text-align: center;
      font-family: var(--mono);
      color: var(--muted);
      padding: 3rem;
      font-size: 0.9rem;
    }

    .error {
      text-align: center;
      font-family: var(--mono);
      color: var(--red);
      padding: 1.5rem;
      font-size: 0.85rem;
      background: rgba(255,77,109,0.05);
      border: 1px solid rgba(255,77,109,0.2);
      border-radius: 6px;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>

function run() {
  const raw = document.getElementById("portInput").value;
  const out = document.getElementById("output");

  const ports = raw.split(",").map(p => parseInt(p.trim())).filter(p => !isNaN(p));

  if (!ports.length) {
    out.innerHTML = `<div class="error">// no valid ports detected — enter numbers separated by commas</div>`;
    return;
  }

  const unknown = ports.filter(p => !PLAYBOOK[p]);
  const known   = ports.filter(p =>  PLAYBOOK[p]);

  let html = "";

  known.forEach((port, i) => {
    const data = PLAYBOOK[port];
    const riskClass = `risk-${data.risk}`;
    const delay = i * 0.06;

    html += `
    <div class="card" style="animation-delay:${delay}s">
      <div class="card-header">
        <span class="port-badge">${port}/tcp</span>
        <span class="service-name">${data.service}</span>
        <span class="risk-badge ${riskClass}">${data.risk.toUpperCase()}</span>
      </div>
      <div class="card-body">
        <div class="section-label">// recon checklist</div>
        <ul>${data.recon.map(r => `<li>${r}</li>`).join("")}</ul>

        <div class="section-label">// commands</div>
        <div class="cmd-block">
          ${data.commands.map(c => `<div class="cmd-line"><span class="prompt">$</span><span>${c}</span></div>`).join("")}
        </div>

        <div class="section-label">// notes</div>
        <ul>${data.notes.map(n => `<li>${n}</li>`).join("")}</ul>
      </div>
    </div>`;
  });

  if (unknown.length) {
    html += `<div class="error">// no playbook entry for port(s): ${unknown.join(", ")} — coming soon</div>`;
  }

  out.innerHTML = html || `<div class="empty">// no matching ports found</div>`;
}

document.getElementById("portInput").addEventListener("keydown", e => {
  if (e.key === "Enter") run();
});
